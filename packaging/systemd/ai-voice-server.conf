# /etc/conf.d/ai-voice-server
# Configuration for the AI Voice Server daemon

# BIND_ADDR="0.0.0.0" will expose the server to your local network
# BIND_ADDR="127.0.0.1" is the secure default (loopback only)
BIND_ADDR="127.0.0.1"
PORT="3000"

# In a Gentoo system installation, persistent data like models should go in /var/lib
MODEL_DIR="/var/lib/ai-voice-server/models"

# Default model to load on startup
WHISPER_MODEL="small.en"

# "auto" will fallback to CPU if no GPU is found
# "require" will fail to start if no GPU is found
GPU_MODE="auto"

# The order to try hardware backends. First available wins.
DEVICE_PRIORITY="cuda,vulkan,cpu"

# Max number of clients that can queue jobs before rejecting
MAX_QUEUE_DEPTH="10"

# Admin API Key for authenticated remote management (e.g. model hot-swapping)
# Must be set to securely use endpoints like /set_model
ADMIN_API_KEY="your-secure-secret-token"
